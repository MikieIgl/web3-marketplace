<div class="connect-page fade-in">
  <div class="connect-card">
    <div class="card-header">
      <span class="header-icon">👛</span>
      <h1>Connect Your Wallet</h1>
      <p>Start exploring the marketplace</p>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">🛍️</span>
        <h3>Buy Unique Items</h3>
        <p>Discover and collect rare digital items</p>
      </div>
      <div class="feature">
        <span class="feature-icon">🔒</span>
        <h3>Secure Transactions</h3>
        <p>All transactions are secured on blockchain</p>
      </div>
      <div class="feature">
        <span class="feature-icon">📦</span>
        <h3>Track Your Items</h3>
        <p>View all your purchases in one place</p>
      </div>
      <div class="feature">
        <span class="feature-icon">💎</span>
        <h3>Sell Items</h3>
        <p>List your own items for sale</p>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn btn-primary connect-button" (click)="connect()">
        <span>👛</span> Connect MetaMask
      </button>
      <button class="btn btn-secondary browse-button" routerLink="/marketplace">
        <span>🏪</span> Browse Marketplace
      </button>
    </div>
  </div>
</div>
